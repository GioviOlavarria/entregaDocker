version: "3.9"

# ============================================================
# DOCKER COMPOSE - Proyecto Semestral Innovatech Chile
# Servicios: frontend (nginx), backend (spring boot), db (mysql)
# Arquitectura refleja la de AWS: 3 capas con redes separadas
# ============================================================

services:

  # ----------------------------------------------------------
  # BASE DE DATOS MYSQL
  # Solo accesible desde la red interna del backend
  # ----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: innovatech-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-despachos_db}
      MYSQL_USER: ${DB_USERNAME:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-apppassword}
    ports:
      # Solo exponer localmente para debugging; en AWS NO exponer al exterior
      - "3307:3306"
    volumes:
      # Volumen nombrado para persistencia de datos
      - mysql_data:/var/lib/mysql
      # Script de inicialización (opcional)
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend-db-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ----------------------------------------------------------
  # BACKEND SPRING BOOT
  # Accesible desde el frontend (puerto 3001 mapeado al 8081)
  # Se conecta a la base de datos por red interna
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: innovatech-backend
    restart: unless-stopped
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-despachos_db}
      DB_USERNAME: ${DB_USERNAME:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-apppassword}
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/${DB_NAME:-despachos_db}?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true"
    ports:
      # Puerto externo 3001 → interno 8081 (según instrucciones AWS)
      - "3001:8081"
    networks:
      - backend-db-net    # Para conectarse a MySQL
      - frontend-backend-net  # Para ser alcanzado por el frontend
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/v1/despachos || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ----------------------------------------------------------
  # FRONTEND NGINX
  # Único servicio expuesto a internet
  # Puerto 8080 interno, mapeado a 80 externo
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: innovatech-frontend
    restart: unless-stopped
    ports:
      # En AWS: puerto 80 y 8080 accesibles desde internet
      - "80:8080"
      - "8080:8080"
    networks:
      - frontend-backend-net  # Solo puede hablar con el backend
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

# ----------------------------------------------------------
# REDES - Aislamiento igual al de AWS VPC
# ----------------------------------------------------------
networks:
  # Red exclusiva frontend ↔ backend
  frontend-backend-net:
    driver: bridge
    name: innovatech-frontend-net

  # Red exclusiva backend ↔ base de datos
  backend-db-net:
    driver: bridge
    name: innovatech-backend-net

# ----------------------------------------------------------
# VOLÚMENES - Persistencia de datos MySQL
# ----------------------------------------------------------
volumes:
  mysql_data:
    driver: local
    name: innovatech-mysql-data
