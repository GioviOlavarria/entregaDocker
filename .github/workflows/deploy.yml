name: CI/CD Pipeline — Innovatech Chile (ECR)

on:
  push:
    branches:
      - deploy

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: 381492149434.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_BACKEND: 381492149434.dkr.ecr.us-east-1.amazonaws.com/innovatech-backend
  IMAGE_FRONTEND: 381492149434.dkr.ecr.us-east-1.amazonaws.com/innovatech-frontend

jobs:
  build-and-push:
    name: Build & Push a ECR
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout del código
        uses: actions/checkout@v4

      - name: 🔐 Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 🔐 Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🐳 Build y Push — Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: 🌐 Build y Push — Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

  deploy-backend:
    name: Deploy Backend → EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Despliegue en EC2 Backend vía bastion
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_FRONTEND_USER }}
          key: ${{ secrets.EC2_FRONTEND_SSH_KEY }}
          script: |
            ssh -i ~/.ssh/innovatech_backend \
                -o StrictHostKeyChecking=no \
                ec2-user@${{ secrets.EC2_BACKEND_HOST }} << 'ENDSSH'
              aws ecr get-login-password --region us-east-1 | docker login \
                --username AWS \
                --password-stdin 381492149434.dkr.ecr.us-east-1.amazonaws.com
              docker stop innovatech-backend 2>/dev/null || true
              docker rm   innovatech-backend 2>/dev/null || true
              docker pull 381492149434.dkr.ecr.us-east-1.amazonaws.com/innovatech-backend:latest
              docker run -d \
                --name innovatech-backend \
                --restart unless-stopped \
                -p 3001:8081 \
                -e DB_ENDPOINT="${{ secrets.DB_ENDPOINT }}" \
                -e DB_PORT="3306" \
                -e DB_NAME="${{ secrets.DB_NAME }}" \
                -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
                -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
                -e SPRING_DATASOURCE_URL="jdbc:mysql://${{ secrets.DB_ENDPOINT }}:3306/${{ secrets.DB_NAME }}?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true" \
                381492149434.dkr.ecr.us-east-1.amazonaws.com/innovatech-backend:latest
              docker image prune -f
            ENDSSH
            echo "✅ Backend desplegado exitosamente"

  deploy-frontend:
    name: Deploy Frontend → EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: 🚀 Despliegue en EC2 Frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_FRONTEND_USER }}
          key: ${{ secrets.EC2_FRONTEND_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-1 | docker login \
              --username AWS \
              --password-stdin 381492149434.dkr.ecr.us-east-1.amazonaws.com
            docker stop innovatech-frontend 2>/dev/null || true
            docker rm   innovatech-frontend 2>/dev/null || true
            docker pull 381492149434.dkr.ecr.us-east-1.amazonaws.com/innovatech-frontend:latest
            docker run -d \
              --name innovatech-frontend \
              --restart unless-stopped \
              -p 80:8080 \
              -p 8080:8080 \
              381492149434.dkr.ecr.us-east-1.amazonaws.com/innovatech-frontend:latest
            docker image prune -f
            echo "✅ Frontend desplegado exitosamente"
